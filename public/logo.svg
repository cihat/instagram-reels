	<rect x="72" y="72" width="368" height="124" rx="28" fill="url(#rs-strip)" />
	<path
		stroke="#ffffff"
		stroke-opacity="0.42"
		stroke-width="10"
		stroke-linecap="round"
		d="M104 168h304"
	/>
	<path
